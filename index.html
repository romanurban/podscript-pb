<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podscript</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="./">Podscript</a></h1>
      <p>Podcast insights, transcribed and analyzed</p>
      <nav>
        <a href="./">Catalog</a>
        <a href="request.html">Request a podcast</a>
      </nav>
    </header>

    <main>
      <p id="status">Loading catalog...</p>
      <div class="catalog" id="catalog"></div>
    </main>

    <footer>
      Powered by <a href="https://github.com/urbanroman/podscript">Podscript</a>
    </footer>
  </div>

  <script>
    (function () {
      var status = document.getElementById('status');
      var catalog = document.getElementById('catalog');

      function setText(msg, isError) {
        status.textContent = msg;
        status.className = isError ? 'error' : 'loading';
      }

      function addPodcast(p) {
        var card = document.createElement('div');
        card.className = 'podcast-card';

        var link = document.createElement('a');
        link.href = 'podcast.html?id=' + encodeURIComponent(p.id);
        link.className = 'podcast-link';

        var title = document.createElement('strong');
        title.className = 'podcast-title';
        title.textContent = p.title || 'Untitled';

        var meta = document.createElement('div');
        meta.className = 'podcast-meta';
        var parts = [];
        if (p.date) parts.push(p.date);
        if (p.lang) parts.push(p.lang);
        if (p.duration_min) parts.push('~' + Math.round(p.duration_min) + ' min');
        meta.textContent = parts.join(' · ');

        var summary = document.createElement('div');
        summary.className = 'podcast-summary';
        summary.textContent = p.summary || '';

        link.appendChild(title);
        if (meta.textContent) link.appendChild(meta);
        if (summary.textContent) link.appendChild(summary);
        card.appendChild(link);
        catalog.appendChild(card);
      }

      var url = 'data/catalog.json';
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.onload = function () {
        if (xhr.status !== 200) {
          setText('Error: HTTP ' + xhr.status + ' loading ' + url, true);
          return;
        }
        try {
          var podcasts = JSON.parse(xhr.responseText);
        } catch (e) {
          setText('Error: invalid JSON in catalog', true);
          return;
        }
        if (!Array.isArray(podcasts) || podcasts.length === 0) {
          setText('No podcasts yet.', false);
          return;
        }
        for (var i = 0; i < podcasts.length; i++) {
          addPodcast(podcasts[i]);
        }
        setText('Loaded ' + podcasts.length + ' podcast' + (podcasts.length === 1 ? '' : 's'), false);
      };
      xhr.onerror = function () {
        setText('Error: network request failed for ' + url, true);
      };
      xhr.send();
    })();
  </script>
</body>
</html>
