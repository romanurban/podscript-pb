<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podscript</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="./">Podscript</a></h1>
      <p>Podcast insights, transcribed and analyzed</p>
      <nav>
        <a href="./">Catalog</a>
        <a href="request.html">Request a podcast</a>
      </nav>
    </header>

    <main>
      <div class="filter-bar" id="filter-bar">
        <label for="lang-select">Language:</label>
        <select id="lang-select" class="lang-select">
          <option value="all">All languages</option>
          <option value="ru">Русский</option>
          <option value="en">English</option>
        </select>
      </div>
      <p id="status">Loading catalog...</p>
      <ul class="catalog" id="catalog"></ul>
    </main>

    <footer>
      Powered by <a href="https://github.com/urbanroman/podscript">Podscript</a>
    </footer>
  </div>

  <script>
    (function () {
      var status = document.getElementById('status');
      var catalog = document.getElementById('catalog');
      var allPodcasts = [];
      var currentLang = 'all';

      function setText(msg, isError) {
        status.textContent = msg;
        status.className = isError ? 'error' : 'loading';
      }

      function renderPodcast(p) {
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = 'podcast.html?id=' + encodeURIComponent(p.id);

        var title = document.createElement('span');
        title.className = 'podcast-title';
        title.textContent = p.title || 'Untitled';

        var meta = document.createElement('span');
        meta.className = 'podcast-meta';
        var parts = [];
        if (p.date) parts.push(p.date);
        if (p.lang) {
          var langSpan = document.createElement('span');
          langSpan.textContent = p.lang.toUpperCase();
          meta.appendChild(langSpan);
        }
        if (p.duration_min) parts.push('~' + Math.round(p.duration_min) + ' min');
        var durationText = parts.join(' \u00b7 ');
        if (durationText) {
          var durSpan = document.createElement('span');
          durSpan.textContent = durationText;
          meta.appendChild(durSpan);
        }

        var summary = document.createElement('span');
        summary.className = 'podcast-summary';
        summary.textContent = p.summary || '';

        a.appendChild(title);
        a.appendChild(meta);
        a.appendChild(summary);
        li.appendChild(a);
        return li;
      }

      function renderCatalog() {
        catalog.innerHTML = '';
        var filtered = currentLang === 'all' 
          ? allPodcasts 
          : allPodcasts.filter(function(p) { return p.lang === currentLang; });
        
        if (filtered.length === 0) {
          setText('No podcasts found for this language.', false);
          return;
        }
        
        for (var i = 0; i < filtered.length; i++) {
          catalog.appendChild(renderPodcast(filtered[i]));
        }
        var total = allPodcasts.length;
        var showing = filtered.length;
        setText('Showing ' + showing + ' of ' + total + ' podcast' + (total === 1 ? '' : 's'), false);
      }

      function setupFilters() {
        var select = document.getElementById('lang-select');
        select.addEventListener('change', function() {
          currentLang = select.value;
          renderCatalog();
        });
      }

      var url = 'data/catalog.json';
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.onload = function () {
        if (xhr.status !== 200) {
          setText('Error: HTTP ' + xhr.status + ' loading ' + url, true);
          return;
        }
        try {
          allPodcasts = JSON.parse(xhr.responseText);
        } catch (e) {
          setText('Error: invalid JSON in catalog', true);
          return;
        }
        if (!Array.isArray(allPodcasts) || allPodcasts.length === 0) {
          setText('No podcasts yet.', false);
          return;
        }
        setupFilters();
        renderCatalog();
      };
      xhr.onerror = function () {
        setText('Error: network request failed for ' + url, true);
      };
      xhr.send();
    })();
  </script>
</body>
</html>
