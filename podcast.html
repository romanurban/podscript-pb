<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podscript</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="./">Podscript</a></h1>
      <nav>
        <a href="./">Catalog</a>
        <a href="request.html">Request a podcast</a>
      </nav>
    </header>

    <main>
      <a href="./" class="back-link">&larr; Back to catalog</a>
      <p id="status" class="loading">Loading...</p>
      <div id="content" class="podcast-content"></div>
    </main>

    <footer>
      Powered by <a href="https://github.com/urbanroman/podscript">Podscript</a>
    </footer>
  </div>

  <script>
    (function () {
      var status = document.getElementById('status');
      var content = document.getElementById('content');
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');

      if (!id) {
        status.textContent = 'No podcast specified.';
        status.className = 'error';
        return;
      }

      var url = 'data/podcasts/' + encodeURIComponent(id) + '/preview.md';
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.onload = function () {
        if (xhr.status !== 200) {
          status.textContent = 'Podcast not found (HTTP ' + xhr.status + ')';
          status.className = 'error';
          return;
        }
        var md = xhr.responseText;
        if (typeof marked !== 'undefined' && marked.parse) {
          content.innerHTML = marked.parse(md);
        } else {
          content.textContent = md;
        }
        status.style.display = 'none';
        var h1 = content.querySelector('h1');
        if (h1) document.title = h1.textContent + ' \u2014 Podscript';
      };
      xhr.onerror = function () {
        status.textContent = 'Network error loading podcast.';
        status.className = 'error';
      };
      xhr.send();
    })();
  </script>
</body>
</html>
