<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podscript</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="./">Podscript</a></h1>
      <p>Podcast insights, transcribed and analyzed</p>
      <nav>
        <a href="./">Catalog</a>
        <a href="request.html">Request a podcast</a>
      </nav>
    </header>

    <main>
      <ul class="catalog" id="catalog">
        <li class="loading">Loading catalog...</li>
      </ul>
    </main>

    <footer>
      Powered by <a href="https://github.com/urbanroman/podscript">Podscript</a>
    </footer>
  </div>

  <script>
    const catalogEl = document.getElementById('catalog');

    fetch('data/catalog.json')
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (podcasts) {
        if (!Array.isArray(podcasts) || !podcasts.length) {
          catalogEl.innerHTML = '<li class="loading">No podcasts yet.</li>';
          return;
        }
        var html = '';
        for (var i = 0; i < podcasts.length; i++) {
          var p = podcasts[i];
          var meta = esc(p.date || '');
          if (p.lang) meta += ' \u00b7 ' + esc(p.lang);
          if (p.duration_min) meta += ' \u00b7 ~' + Math.round(p.duration_min) + ' min';
          html += '<li><a href="podcast.html?id=' + encodeURIComponent(p.id) + '">'
            + '<span class="podcast-title">' + esc(p.title) + '</span>'
            + '<span class="podcast-meta">' + meta + '</span>'
            + '<span class="podcast-summary">' + esc(p.summary) + '</span>'
            + '</a></li>';
        }
        catalogEl.innerHTML = html;
      })
      .catch(function (err) {
        console.error('Catalog error:', err);
        catalogEl.innerHTML = '<li class="error">Failed to load catalog.</li>';
      });

    function esc(s) {
      var d = document.createElement('span');
      d.textContent = s || '';
      return d.innerHTML;
    }
  </script>
</body>
</html>
